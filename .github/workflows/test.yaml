name: Test

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.TEST_AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.TEST_AWS_SECRET_ACCESS_KEY }}
  AWS_DEFAULT_REGION: eu-central-1
  AWS_DISTRIBUTION_ID: ${{ secrets.TEST_AWS_DISTRIBUTION_ID }}
  AWS_BUCKET_NAME: ${{ secrets.TEST_AWS_BUCKET_NAME }}
  GATSBY_ALEPHIUM_HOSTNAME: alephium.org

jobs:
  linkChecker:
    runs-on: ubuntu-latest
    # permissions:
    # issues: write # required for peter-evans/create-issue-from-file
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Setup node.js
        uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version: 18

      - name: Caching Gatsby
        id: gatsby-cache-build
        uses: actions/cache@9255dc7a253b0ccc959486e2bca901246202afeb # v5.0.1
        with:
          path: |
            public
            .cache
          key: ${{ runner.os }}-gatsby-build-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-gatsby-build-

      - name: Build website
        run: npm install gatsby-cli && npm run build --log-pages
        env:
          GATSBY_EXPERIMENTAL_PAGE_BUILD_ON_DATA_CHANGES: true
          CI: true

      - name: Link Checker
        id: lychee
        uses: lycheeverse/lychee-action@a8c4c7cb88f0c7386610c35eb25108e448569cb0 # 2.7.0
        with:
          fail: true
          args: --base-url https://alephium.org --exclude-all-private --exclude '^file:' --exclude '^https://www.linkedin.com' --exclude '^https://alephium.org/static/' --exclude '^https://www.bitcoinchair.com/' --accept '100..=103,200..=299,401,403,429' './**/*.html'
          workingDirectory: public
